name: ci-cd-demo-pipeline

on:
    push:
        branches: [ "main" ]
    workflow_dispatch:

jobs:
    checkout-code:
        runs-on: ubuntu-latest
        steps:
        - name: "build-and-test"
          uses: actions/checkout@v6
        - name: set up python
          uses: actions/setup-python@v6
          with:
            python-version: '3.13'
        - run:  pip install -r requirements.txt
        - run: python -m pytest tests/test_app.py
        - run: flake8 src tests
        - name: SonarQube Scan
          uses: SonarSource/sonarqube-scan-action@v7
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          with:
            args: >
                -Dsonar.organization=akhilkumar0024
                -Dsonar.projectKey=akhilkumar0024_Github-Action-Demo
                -Dsonar.sources=src
    #Docker build image scan image and push image to Dockerhub
    docker_build:
        needs: checkout-code
        runs-on: ubuntu-latest
        steps:
        - name: checkout code
          uses: actions/checkout@v6
          #login to Dockerhub
        - name: login to dockerhub
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        #set up docker
        - name: set up docker
          uses: docker/setup-buildx-action@v2
        #build Docker Image
        - name: build Docker Image
          uses: docker/build-push-action@v4
          with:
            context: .
            push: false
            # setting the load flag to true tells the Docker image to be made visible and be loaded into the 
            # docker daemon allowing other tools so view it, in this case allows trivy to see so that it can scan it
            load: true
            tags: |
             ${{ vars.DOCKERHUB_USERNAME }}/github-action-demo:latest
             ${{vars.DOCKERHUB_USERNAME}}/github-action-demo:${{github.run_number}}
        # scan the Docker Image with Trivy
        - name: Scan Docker Image with Trivy
          uses: aquasecurity/trivy-action@v0.36.0
          with:
            image-ref: ${{ vars.DOCKERHUB_USERNAME }}/github-action-demo:${{github.run_number}}
            format: table
            exit-code: 1
            ignore-unfixed: true
            severity: HIGH,CRITICAL
        - name: Upload The Docker Image to Docker Hub
          uses: docker/build-push-action@v4
          with:
            context: .
            push: true
            tags: |
             ${{ vars.DOCKERHUB_USERNAME }}/github-action-demo:latest
             ${{vars.DOCKERHUB_USERNAME}}/github-action-demo:${{github.run_number}}



          


        



